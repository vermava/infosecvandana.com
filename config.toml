baseURL = "https://infosecvandana.com/"
languageCode = "en-us"
title = "Vandana Verma"

publishDir = "docs"

theme = "personal-web"
copyright="© Vandana Verma"

[params.intro]
  main = "Vandana Verma"
  sub = "Global Cybersecurity Speaker, AI/AppSec Leader"
  tagline = "Educator, advisor, and community builder"

[params.main]
  latestPublishHeader = "My Project"

[params]
  breadcrumb = false
  accentColor = "#FD3519"
  homeSeoTitle = "Vandana Verma | Global Cybersecurity Speaker, AI/AppSec Leader, Educator, Advisor"
  homeMetaDescription = "Official website of Vandana Verma: global cybersecurity speaker, AI and application security leader, trainer, advisor, author, and community builder."
  defaultDescription = "Explore Vandana Verma's work across cybersecurity speaking, AI and application security leadership, training, advisory, media, and community impact."
  mainSections = ['post'] # values: ['post', 'portfolio'] only accept one section, to be displayed bellow 404

[params.notFound]
  gopher = "/images/gopher.png" # checkout https://gopherize.me/
  h1 = 'Bummer!'
  p = "404 not found"

[params.sections]
  # Define how your sections will be called
  # when automatically pulled. For instance in the 404 page
  post = "article"
  portfolio = "project"

[params.sidebar]
  backgroundImage = '/images/background_blue.jpg' # header background image - default "/images/default_sidebar.jpg" - Photo by Tim Marshall on Unsplash
  gradientOverlay = '' # default: rgba(0,0,0,0.4),rgba(0,0,0,0.4)
  #logo = "/images/vandana_headshot.jpeg" # - default "/images/edna-west.jpg"
[params.assets]
  favicon = ""
  customCSS = "/css/site-overrides.css"

[params.social]
  github = "https://github.com/vermava"
  twitter = "https://twitter.com/infosecvandana"
  linkedin = "https://www.linkedin.com/in/vandana-verma"
  youtube = "https://www.youtube.com/channel/UCyr-gas4Un-3YBEDIUQtNjg"
  instagram = "https://www.instagram.com/infosecvandana/"

[params.contact]
  email = ""
  text= "" # text of the contact link in the sidebar. If email params.contact.email is defined

[params.footer]
  tagline = "Cybersecurity leader focused on AI security, AppSec, secure development, and community impact."


